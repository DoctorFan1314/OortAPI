services:
  oortapi:
    # Option 1: Build from source (default)
    build:
      context: .
      network: host
    # Option 2: Use pre-built image (faster, no build tools needed)
    # Comment out 'build:' above and uncomment below:
    # image: ghcr.io/doctorfan1314/oortapi:latest
    container_name: oortapi
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      # JWT_SECRET and ENCRYPTION_KEY are auto-generated on first run
      # Uncomment below to set your own values:
      # - JWT_SECRET=your-secret-here
      # - ENCRYPTION_KEY=your-key-here
