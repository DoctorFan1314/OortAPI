services:
  oortapi:
    # Option 1: Use pre-built image (recommended)
    image: ghcr.io/doctorfan1314/oortapi:latest
    # Option 2: Build from source (uncomment below, comment out image above)
    # build: .
    container_name: oortapi
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      # JWT_SECRET and ENCRYPTION_KEY are auto-generated on first run
      # Uncomment below to set your own values:
      # - JWT_SECRET=your-secret-here
      # - ENCRYPTION_KEY=your-key-here
